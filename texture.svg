<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(236,230,216,0.09)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-mini" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.4" fill="rgba(236,230,216,0.08)"/>
    </pattern>
    <filter id="grain" x="0" y="0">
      <feTurbulence type="fractalNoise" baseFrequency="1.1" numOctaves="2" seed="5"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.93  0 0 0 0 0.91  0 0 0 0 0.86  0 0 0 0.35 0"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" filter="url(#grain)"/>
  <rect width="100%" height="100%" fill="url(#grid-mini)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
</svg>
